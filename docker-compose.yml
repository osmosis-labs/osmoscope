version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: osmometer-db
    environment:
      POSTGRES_USER: osmometer
      POSTGRES_PASSWORD: osmometer_dev
      POSTGRES_DB: osmometer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
